# Порядок важен: комбинированные модификаторы (ℹ️🔽) — раньше одиночных (ℹ️, 🔽)

admotion_info_collapse:
  convert:
    # ℹ️🔽 "Заголовок" или ℹ️🔽 Заголовок → ??? note "Заголовок"
    from: 'r''ℹ️🔽 "?(.+?)"?\s*$'''
    to: '??? note "\1"'
  examples:
    src: 'ℹ️🔽 "Поток управления «в остальных случаях», поток по умолчанию"'
    convert: '??? note "Поток управления «в остальных случаях», поток по умолчанию"'

admotion_info:
  convert:
    # ℹ️ "Заголовок" или ℹ️ Заголовок → !!! note "Заголовок"
    from: 'r''ℹ️ "?(.+?)"?\s*$'''
    to: '!!! note "\1"'
  examples:
    src: 'ℹ️ "Зависимость от прав групп"'
    convert: '!!! note "Зависимость от прав групп"'

admotion_warning:
  convert:
    # ⚠️ "Заголовок" или ⚠️ Заголовок → !!! warning "Заголовок"
    from: 'r''⚠️ "?(.+?)"?\s*$'''
    to: '!!! warning "\1"'
  examples:
    src: '⚠️ "Ограничения возможностей прав"'
    convert: '!!! warning "Ограничения возможностей прав"'

drop-down:
  convert:
    # 🔽 "Заголовок" или 🔽 Заголовок → ??? note "Заголовок"
    from: 'r''🔽 "?(.+?)"?\s*$'''
    to: '??? note "\1"'
  examples:
    src: '🔽 "Что такое группа?"'
    convert: '??? note "Что такое группа?"'

tabs:
  convert:
    # Детектирует весь блок вкладок от 🗂️ до первой строки без отступа или конца файла.
    # Логика разбивки по вкладкам реализована в MKdocsAdapter._apply_tabs()
    from: |
      r'🗂️[ \t]*\n((?:\n|\d+\..+\n(?:(?:[ ]{4}|\t).+\n|\n)*)+)'
    # {tab_name} и {tab_body} — псевдо-переменные, итерация в коде адаптера
    to: |
      === "{tab_name}"

          {tab_body}
  examples:
    src: |
      🗂️
      1. Linux

          1. Обновите apt-пакеты: `sudo apt update`
          1. Установите Caddy: `sudo apt install caddy`
          1. Проверьте версию: `caddy version`

      2. Windows (PowerShell)

          1. Установите Caddy: `choco install caddy`
          1. Проверьте версию: `caddy version`

      3. MacOS (Brew)

          1. Обновите Brew: `brew update`
          1. Установите Caddy: `brew install caddy`
          1. Проверьте версию: `caddy version`
    convert: |
      === "Linux"

          1. Обновите apt-пакеты: `sudo apt update`
          1. Установите Caddy: `sudo apt install caddy`
          1. Проверьте версию: `caddy version`

      === "Windows (PowerShell)"

          1. Установите Caddy: `choco install caddy`
          1. Проверьте версию: `caddy version`

      === "MacOS (Brew)"

          1. Обновите Brew: `brew update`
          1. Установите Caddy: `brew install caddy`
          1. Проверьте версию: `caddy version`
